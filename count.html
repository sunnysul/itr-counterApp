<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>Counter App</h1>
    <h2 id="countId"> 0 </h2>

    <div>
        <button onclick="inc()">+</button>
        <button onclick="reset()">RESET</button>
        <button onclick="dec()">-</button>
    </div>


    <script>
        let count = 0;

        function update() {
            document.getElementById("countId").innerText = count
        }

        function inc() {
            count += 1;
            update()
        }

        function dec() {
            count -= 1;
            update()
        }

        function reset() {
            count = 0;
            update()
        }
    </script>
</body>

</html>
